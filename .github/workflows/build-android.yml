name: Build React Native Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install dependencies
      run: npm install

    - name: Install React Native dependencies
      run: |
        npm install react-native
        npm install @react-navigation/native @react-navigation/bottom-tabs
        npm install react-native-screens react-native-safe-area-context
        npm install react-native-vector-icons
        npm install axios
        npm install @react-native-async-storage/async-storage

    - name: Create React Native entry file
      run: |
        cat > index.js << 'EOF'
        import { AppRegistry } from 'react-native';
        import App from './App';
        import { name as appName } from './app.json';

        AppRegistry.registerComponent(appName, () => App);
        EOF

    - name: Create App.js
      run: |
        cat > App.js << 'EOF'
        import React from 'react';
        import { View, Text, StyleSheet } from 'react-native';

        const App = () => {
          return (
            <View style={styles.container}>
              <Text style={styles.title}>MyPinkShop</Text>
              <Text style={styles.subtitle}>Coming Soon!</Text>
            </View>
          );
        };

        const styles = StyleSheet.create({
          container: {
            flex: 1,
            justifyContent: 'center',
            alignItems: 'center',
            backgroundColor: '#fdf2f8',
          },
          title: {
            fontSize: 24,
            fontWeight: 'bold',
            color: '#ec4899',
          },
          subtitle: {
            fontSize: 16,
            color: '#666',
            marginTop: 10,
          },
        });

        export default App;
        EOF

    - name: Create app.json
      run: |
        cat > app.json << 'EOF'
        {
          "name": "MyPinkShop",
          "displayName": "MyPinkShop"
        }
        EOF

    - name: Create metro.config.js
      run: |
        cat > metro.config.js << 'EOF'
        const { getDefaultConfig } = require('@react-native/metro-config');
        const defaultConfig = getDefaultConfig(__dirname);
        module.exports = defaultConfig;
        EOF

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Build Debug APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: MyPinkShop-Debug
        path: android/app/build/outputs/apk/debug/*.apk

    - name: Build Release APK
      run: |
        cd android
        ./gradlew assembleRelease

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: MyPinkShop-Release
        path: android/app/build/outputs/apk/release/*.apk
