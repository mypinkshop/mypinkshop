<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyPinkShop - Shop for Girlies ✨</title>
    
    <!-- ========== PRECONNECT FOR FASTER API CALLS ========== -->
    <link rel="preconnect" href="https://api.mypinkshop.com" />
    <link rel="dns-prefetch" href="https://api.mypinkshop.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    
    <!-- ========== COMPLETE FAVICON - ALL DEVICES & BROWSERS ========== -->
    
    <!-- ICO format - Old browsers (IE, Old Chrome/Firefox) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    
    <!-- PNG formats - Modern browsers -->
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    
    <!-- Apple Touch Icon - iPhone, iPad, Mac Safari -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    
    <!-- Android Chrome - Homescreen icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />
    
    <!-- Web Manifest - PWA support -->
    <link rel="manifest" href="/site.webmanifest" />
    
    <!-- Windows 8/10/11 Tiles -->
    <meta name="msapplication-TileColor" content="#ec4899" />
    <meta name="msapplication-TileImage" content="/android-chrome-192x192.png" />
    
    <!-- Browser theme color -->
    <meta name="theme-color" content="#ec4899" />
    
    <!-- Font Awesome - Defer loading -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" /></noscript>
    
    <!-- Critical CSS inline -->
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,sans-serif}
      .loading-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#fdf2f8,#fff,#fce7f3);display:flex;align-items:center;justify-content:center;z-index:9999}
      .loading-spinner{width:50px;height:50px;border:4px solid #fbcfe8;border-top-color:#ec4899;border-radius:50%;animation:spin 1s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-screen">
        <div class="loading-spinner"></div>
      </div>
    </div>
    
    <!-- Main script with defer -->
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Defer non-critical operations -->
    <script>
      // Remove loading screen when React mounts
      window.addEventListener('load', function() {
        setTimeout(function() {
          const loader = document.querySelector('.loading-screen');
          if (loader) {
            loader.style.opacity = '0';
            setTimeout(function() {
              if (loader.parentNode) loader.parentNode.removeChild(loader);
            }, 300);
          }
        }, 100);
      });
      
      // Defer wishlist update
      window.addEventListener('load', function() {
        setTimeout(function() {
          window.dispatchEvent(new CustomEvent('wishlistUpdated'));
        }, 500);
      });
      
      // Prefetch common routes on idle
      if ('requestIdleCallback' in window) {
        requestIdleCallback(function() {
          const links = ['/shop', '/wishlist', '/cart'];
          links.forEach(function(link) {
            const prefetchLink = document.createElement('link');
            prefetchLink.rel = 'prefetch';
            prefetchLink.href = link;
            document.head.appendChild(prefetchLink);
          });
        });
      }
    </script>
  </body>
</html>
