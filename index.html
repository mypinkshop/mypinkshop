<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyPinkShop - Shop for Girlies ✨</title>
    
    <!-- ========== PRECONNECT FOR FASTER API CALLS ========== -->
    <link rel="preconnect" href="https://api.mypinkshop.com" />
    <link rel="dns-prefetch" href="https://api.mypinkshop.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    
    <!-- ========== COMPLETE FAVICON - ALL DEVICES & BROWSERS ========== -->
    
    <!-- ICO format - Old browsers (IE, Old Chrome/Firefox) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    
    <!-- PNG formats - Modern browsers -->
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    
    <!-- Apple Touch Icon - iPhone, iPad, Mac Safari -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    
    <!-- Android Chrome - Homescreen icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />
    
    <!-- Web Manifest - PWA support -->
    <link rel="manifest" href="/site.webmanifest" />
    
    <!-- Windows 8/10/11 Tiles -->
    <meta name="msapplication-TileColor" content="#ec4899" />
    <meta name="msapplication-TileImage" content="/android-chrome-192x192.png" />
    
    <!-- Browser theme color -->
    <meta name="theme-color" content="#ec4899" />
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
